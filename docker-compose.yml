services:
  postgres:
    image: postgres:16
    container_name: ccd-exit-clearance-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ccd_exit_clearance
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ccd_exit_clearance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccd-exit-clearance-api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ccd_exit_clearance
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
