services:
  postgres:
    image: postgres:16
    container_name: ccd-exit-clearance-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccd-exit-clearance-api
    env_file:
      - .env
    environment:
      PORT: 8080
      CLIENT_URL: http://localhost
    ports:
      - "8080:8080"
    networks:
      - app-network

  web:
    build:
      context: ./School-Request-Management-Portal
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_SUPABASE_MESSAGE_ATTACHMENTS_BUCKET: ${VITE_SUPABASE_MESSAGE_ATTACHMENTS_BUCKET:-message-attachments}
    container_name: ccd-exit-clearance-web
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
